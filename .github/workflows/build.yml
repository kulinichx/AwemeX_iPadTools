name: Build Deb

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    strategy:
      matrix:
        scheme:
          - rootful
          - rootless

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Build rootful
        if: matrix.scheme == 'rootful'
        run: |
          make clean package

      - name: Build rootless
        if: matrix.scheme == 'rootless'
        run: |
          make clean package SCHEME=rootless

      - name: Rename packages
        run: |
          mkdir -p output
          for f in packages/*.deb; do
            cp "$f" "output/${matrix.scheme}-$(basename "$f")"
          done

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: AwemeX-iPadTools-${{ matrix.scheme }}
          path: output/*.deb
